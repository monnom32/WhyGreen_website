<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wind Clicker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background pic -->
  <div id="background">
    <img id="bg-img" src="images/bg.png" alt="" onerror="this.style.display='none'" />
  </div>

  <!-- Header -->
  <header>
    <h1>Wind Clicker</h1>
    <div id="energy-display">
      <span id="energy-count">0</span> ⚡ energie
      &nbsp;|&nbsp;
      <span id="rate-display">0</span> ⚡/sec
    </div>
  </header>

  <main>

    <!-- Turbine stuff -->
    <section id="turbine-section">
      <div id="turbine-wrap" title="Нажми, чтобы генерировать энергию!">

        <!-- Tower graphics -->
        <img id="tower-img" src="images/tower.png" alt="башня"
             onerror="this.style.display='none'" />

        <!--Blade grapgics -->
        <img id="blade-img" src="images/blade.png" alt="пропеллер"
             onerror="this.style.display='none'" />

        <!-- Placeholder if no image -->
        <div id="turbine-placeholder">
          <div id="ph-blade">🌀</div>
          <div id="ph-tower">|</div>
        </div>

      </div>
      <p id="click-hint">Clique sur l'éolienne !</p>
      <p id="click-value">+<span id="click-energy">1</span> ⚡ par clic</p>
    </section>

    <!-- upgrades -->
    <section id="upgrades-section">
      <h2>Améliorations</h2>
      <div id="upgrades-list">
        <!-- Upgrades generate from JS -->
      </div>
    </section>

  </main>

  <!-- Facts popup -->
  <div id="fact-overlay" class="hidden">
    <div id="fact-box">
      <div id="fact-icon">🌍</div>
      <p id="fact-text"></p>
      <button id="fact-close">Ok</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
